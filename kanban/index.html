<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Kanban</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Quadro Kanban</h1>

<div class="board">

  <div class="column" id="todo">
    <h2>A Fazer</h2>
    <button id="btn-todo">+ Adicionar</button>
    <div class="card-container"></div>
  </div>

  <div class="column" id="in-progress">
    <h2>Fazendo</h2>
    <button id="btn-doing">+ Adicionar</button>
    <div class="card-container"></div>
  </div>

  <div class="column" id="done">
    <h2>Concluído</h2>
    <button id="btn-done">+ Adicionar</button>
    <div class="card-container"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
